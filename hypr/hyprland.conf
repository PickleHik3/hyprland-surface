# Hyprland Configuration
# https://wiki.hypr.land/Configuring/

# ==================
# MONITOR CONFIG
# ==================
# monitor = eDP-2, 2560x1600@239.998993, 2560x0, 1, vrr, 1
monitor = eDP-1, preferred,auto,2,transform,0

# ==================
# INPUT METHOD (Fcitx5 + wvkbd)
# ==================
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx

# ==================
# STARTUP APPS
# ==================
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start hyprland-session.target
exec-once = hyprpm reload -n
exec-once = systemctl --user start hyprpolkitagent
exec-once = fcitx5 -d
exec-once = /home/amalv/Documents/hyprland-tablet-backup/hyprland-surface/wvkbd-custom/scripts/start-wvkbd.sh
exec-once = iio-hyprland

# ==================
# INPUT CONFIG
# ==================
input {
    kb_layout = us
    numlock_by_default = true
}

# ==================
# GENERAL LAYOUT
# ==================
general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2

    layout = dwindle
}

# ==================
# DECORATION
# ==================
decoration {
    rounding = 12

    active_opacity = 1.0
    inactive_opacity = 1.0
    dim_around = 0.7

    blur {
        enabled = true
        size = 6
        passes = 2
        noise = 0.01
        contrast = 1.0
        brightness = 1.0
    }

    shadow {
        enabled = true
        range = 30
        render_power = 5
        offset = 0 5
        color = rgba(00000070)
    }
}

# ==================
# ANIMATIONS
# ==================
animations {
    enabled = true

    animation = windowsIn, 1, 3, default
    animation = windowsOut, 1, 3, default
    animation = workspaces, 1, 5, default
    animation = windowsMove, 1, 4, default
    animation = fade, 1, 3, default
    animation = border, 1, 3, default
}

# ==================
# LAYOUTS
# ==================
dwindle {
    preserve_split = true
}

master {
    mfact = 0.5
}

# ==================
# MISC
# ==================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ==================
# TOUCH GESTURES (Hyprgrass)
# ==================
plugin {
    touch_gestures {
      sensitivity = 4.0
      long_press_delay = 400
      resize_on_border_long_press = true
      workspace_swipe_fingers = 3
      workspace_swipe_edge = d
      edge_margin = 10

      # Bottom edge swipe up: open qs-hyprview overview
      hyprgrass-bind = , edge:d:u, exec, quickshell ipc -p /home/amalv/Documents/hyprland-tablet-backup/qs-hyprview call expose open smartgrid
      # Left edge swipe down: kill active window
      hyprgrass-bind = , edge:l:d, killactive
      # Right edge swipe up: open app drawer inside DMS Spotlight
      hyprgrass-bind = , edge:r:d, exec, dms ipc call spotlight openWith appdrawer
      # Top edge swipe right: re-enable auto mode + show keyboard now
      hyprgrass-bind = , edge:u:r, exec, /home/amalv/Documents/hyprland-tablet-backup/hyprland-surface/wvkbd-custom/scripts/auto-show-wvkbd.sh
      # Top edge swipe left: disable keyboard entirely
      hyprgrass-bind = , edge:u:l, exec, /home/amalv/Documents/hyprland-tablet-backup/hyprland-surface/wvkbd-custom/scripts/disable-wvkbd.sh
      hyprgrass-bindm = , longpress:2, movewindow
      # Resize Window for floating windows
      hyprgrass-bindm = , longpress:3, resizewindow
    }
}

gestures {
  workspace_swipe_touch = false
  workspace_swipe_cancel_ratio = 0.1
}

# ==================
# WINDOW RULES
# ==================
windowrule = tile on, match:class ^(org\.wezfurlong\.wezterm)$

windowrule = rounding 12, match:class ^(org\.gnome\.)

windowrule = tile on, match:class ^(gnome-control-center)$
windowrule = tile on, match:class ^(pavucontrol)$
windowrule = tile on, match:class ^(nm-connection-editor)$

windowrule = float on, match:class ^(gnome-calculator)$
windowrule = float on, match:class ^(galculator)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(org\.gnome\.Nautilus)$
windowrule = float on, match:class ^(xdg-desktop-portal)$

windowrule = no_initial_focus on, match:class ^(steam)$, match:title ^(notificationtoasts)
windowrule = pin on, match:class ^(steam)$, match:title ^(notificationtoasts)

windowrule = float on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(zen)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(zoom)$

# DMS windows floating by default
# ! Hyprland doesn't size these windows correctly so disabling by default here
# windowrule = float on, match:class ^(org.quickshell)$

layerrule = no_anim on, match:namespace ^(quickshell)$
layerrule = no_anim on, match:namespace ^dms:.*
layerrule = blur on, match:namespace ^(quickshell:expose)$

source = ./dms/colors.conf
source = ./dms/outputs.conf
source = ./dms/layout.conf
source = ./dms/cursor.conf
source = ./dms/binds.conf
