input {
    kb_layout = us
    numlock_by_default = true
    accel_profile = flat
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 2

    active_opacity = 0.98
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0
    dim_around = 0.7

    blur {
        enabled = true
        size = 6
        passes = 3
        contrast = 1.5
        brightness = 0.8
        vibrancy = 0.2
        vibrancy_darkness = 0.2
        noise = 0.07
        ignore_opacity = true
        new_optimizations = on
    }

    shadow {
        enabled = false
        range = 4
        render_power = 3
        offset = 0 1
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true

    animation = windowsIn, 1, 3, default
    animation = windowsOut, 1, 3, default
    animation = workspaces, 1, 5, default
    animation = windowsMove, 1, 4, default
    animation = fade, 1, 3, default
    animation = border, 1, 3, default
}

dwindle {
    preserve_split = true
}

master {
    mfact = 0.5
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    key_press_enables_dpms = true
}
