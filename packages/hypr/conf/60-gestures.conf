# Noctalia shell IPC disabled during Caelestia migration
# $ipc = qs -c noctalia-shell ipc call

plugin {
    touch_gestures {
        sensitivity = 4.0
        long_press_delay = 400
        resize_on_border_long_press = true
        workspace_swipe_fingers = 3
        workspace_swipe_edge = d
        edge_margin = 10

        hyprgrass-bind = , edge:d:u, exec, quickshell ipc -p ~/.config/hypr/apps/qs-hyprview call expose open smartgrid
        hyprgrass-bind = , edge:l:d, killactive
        # hyprgrass-bind = , edge:r:d, exec, $ipc launcher toggle
        hyprgrass-bind = , edge:u:r, exec, ~/.config/hypr/apps/wvkbd/scripts/auto-show-wvkbd.sh
        hyprgrass-bind = , edge:u:l, exec, ~/.config/hypr/apps/wvkbd/scripts/disable-wvkbd.sh
        hyprgrass-bindm = , longpress:2, movewindow
        hyprgrass-bindm = , longpress:3, resizewindow
    }
}

gestures {
    workspace_swipe_touch = false
    workspace_swipe_cancel_ratio = 0.1
}
